name: Deploy render worker + container

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "api/apps/render/**"
      - "api/containers/renderer/**"
      - "api/packages/**"
      - ".github/workflows/deploy-render-container.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Deploy render worker (builds container image with Docker)
        working-directory: api/apps/render
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 58f07fb13c26e83dd6109d957083478d
