name: Deploy render worker + container

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-render-production
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Typecheck render Worker
        working-directory: api/apps/render
        run: pnpm typecheck

      - name: Validate Worker bundle before deployment
        working-directory: api/apps/render
        run: pnpm exec wrangler deploy --dry-run --outdir .wrangler/release-dry-run

      - name: Deploy render worker (builds container image with Docker)
        working-directory: api/apps/render
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 58f07fb13c26e83dd6109d957083478d
