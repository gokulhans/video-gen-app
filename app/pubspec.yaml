name: ai_video_maker
description: "AI Video Maker - generate short-form marketing videos with AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Secure storage for auth tokens
  flutter_secure_storage: ^9.2.2

  # Media
  video_player: ^2.9.2
  just_audio: ^0.9.42
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Sharing / downloading
  share_plus: ^10.1.3
  path_provider: ^2.1.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Realtime
  web_socket_channel: ^3.0.1

  # Formatting
  intl: ^0.19.0

  # Auth
  google_sign_in: ^6.2.2

  # Billing (Play Billing wiring, verified server-side)
  in_app_purchase: ^3.2.1

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
